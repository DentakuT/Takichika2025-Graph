<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>滝地下麻雀順位表 (詳細データ版)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        background-color: #f9f9f9;
        color: #333;
        margin: 0;
    }
    .header {
        background-color: #2c3e50;
        color: #ecf0f1;
        padding: 1rem;
        text-align: center;
    }
    .main-content {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
    }
    .table-container {
        overflow-x: auto;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border-radius: 8px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background-color: #fff;
    }
    th, td {
        border-bottom: 1px solid #ddd;
        padding: 12px 15px;
        text-align: left;
    }
    thead th {
        background-color: #34495e;
        color: #ecf0f1;
    }

    /* 名前をボタン風にする */
    .player-name {
        color: #3498db;
        cursor: pointer;
        text-decoration: underline;
        font-weight: bold;
    }
    .player-name:hover {
        color: #2980b9;
    }

    /* 隠し行のアニメーション */
    .graph-row {
        background-color: #fff;
    }
    .graph-container {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.5s ease-out;
        background-color: #fcfcfc;
    }
    .graph-container.open {
        max-height: 800px;
        padding: 10px 0;
        border-bottom: 2px solid #ddd;
    }

    /* 詳細エリア（スタッツとグラフ）のレイアウト */
    .details-flex {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        align-items: center;
        padding: 10px;
        gap: 20px;
    }
    
    /* 成績スタッツのボックス */
    .stats-container {
        flex: 1;
        min-width: 250px;
        background: #ecf0f1;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .stats-container h3 {
        margin: 0 0 15px 0;
        font-size: 1.1em;
        color: #2c3e50;
        text-align: center;
        border-bottom: 2px solid #bdc3c7;
        padding-bottom: 5px;
    }
    .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        text-align: center;
    }
    .stat-item {
        background: #fff;
        padding: 10px 5px;
        border-radius: 4px;
        font-size: 0.9em;
        font-weight: bold;
        color: #34495e;
    }
    .stat-item.avg {
        grid-column: 1 / -1;
        font-size: 1.1em;
        background: #dff9fb;
        color: #0984e3;
    }

    /* グラフのボックス */
    .graph-container-inner {
        flex: 2;
        min-width: 300px;
        height: 300px;
    }
    canvas {
        max-width: 100%;
        margin: 0 auto;
    }

    /* ページ下部のランキングエリア */
    .extra-rankings-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 3rem;
        margin-bottom: 2rem;
    }
    .ranking-card {
        flex: 1;
        min-width: 250px;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .ranking-card h3 {
        margin-top: 0;
        border-bottom: 2px solid #3498db;
        padding-bottom: 8px;
        color: #2c3e50;
        font-size: 1.2em;
    }
    .ranking-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .ranking-list li {
        padding: 10px 0;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .ranking-list li:last-child {
        border-bottom: none;
    }
    .rank-badge {
        font-weight: bold;
        color: #e67e22;
        display: inline-block;
        width: 24px;
    }
    .ranking-value {
        font-weight: bold;
        color: #34495e;
    }
    .ranking-sub {
        font-size: 0.8em;
        color: #7f8c8d;
        margin-left: 5px;
    }
</style>
</head>
<body>

<header class="header">
    <h1>滝地下麻雀順位表<br>(2025年度)</h1>
    <p>名前をクリックすると詳細データとグラフが表示されます</p>
</header>

<main class="main-content">
    <div class="table-container">
        <table id="rankings">
            <thead>
                <tr>
                    <th>順位</th>
                    <th>名前</th>
                    <th>最終レート</th>
                </tr>
            </thead>
            <tbody id="rankings-body">
                </tbody>
        </table>
    </div>

    <!-- ページ下部のランキングエリア -->
    <div class="extra-rankings-container">
        <div class="ranking-card">
            <h3>👑 平均順位 トップ5 <span style="font-size: 0.6em; color: #7f8c8d; font-weight: normal;">(5局以上)</span></h3>
            <ul class="ranking-list" id="rank-avg"></ul>
        </div>
        <div class="ranking-card">
            <h3>⚔️ 対局数 トップ5</h3>
            <ul class="ranking-list" id="rank-total"></ul>
        </div>
        <div class="ranking-card">
            <h3>🔥 最高得点 トップ5</h3>
            <ul class="ranking-list" id="rank-score"></ul>
        </div>
    </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', generateRankings);

function normalizeName(name) {
    if (!name) return "";
    let normalized = name.replace(/[\(（].*?[\)）]/g, "");
    normalized = normalized.trim();
    normalized = normalized.toLowerCase();
    normalized = normalized.replace(/[\u30A1-\u30F6]/g, function(match) {
        return String.fromCharCode(match.charCodeAt(0) - 0x60);
    });
    return normalized;
}

async function generateRankings() {
    const tableBody = document.getElementById("rankings-body");
    const months = ["開始", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月", "1月"];
    
    tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center;">読み込み中...</td></tr>';

    try {
        const [res1, res2] = await Promise.all([
            fetch("data.txt"),
            fetch("data2.txt").catch(() => null)
        ]);

        if (!res1.ok) throw new Error("メインデータ(data.txt)が見つかりません");
        const data = await res1.text();

        const statsData = {};
        if (res2 && res2.ok) {
            const data2 = await res2.text();
            
            const games = data2.split(/\n\s*\n/);
            
            for (const game of games) {
                const lines2 = game.trim().split('\n');
                const gamePlayers = [];
                
                for (const line of lines2) {
                    if (!line.trim()) continue;
                    const parts = line.trim().split(/\s+/);
                    if (parts.length >= 2) {
                        const rawName = parts[0];
                        const score = parseInt(parts[1], 10);
                        gamePlayers.push({ name: rawName, score: score });
                    }
                }
                
                if (gamePlayers.length === 0) continue;

                const isRawScore = gamePlayers.some(p => Math.abs(p.score) > 2000);
                
                gamePlayers.sort((a, b) => b.score - a.score);
                
                gamePlayers.forEach((player, index) => {
                    const rank = index + 1;
                    const normalizedName = normalizeName(player.name);
                    
                    const actualScore = isRawScore ? player.score : player.score * 100;
                    
                    if (!statsData[normalizedName]) {
                        statsData[normalizedName] = { 1: 0, 2: 0, 3: 0, 4: 0, total: 0, maxScore: -Infinity };
                    }
                    
                    if (rank >= 1 && rank <= 4) {
                        statsData[normalizedName][rank]++;
                        statsData[normalizedName].total++;
                        if (actualScore > statsData[normalizedName].maxScore) {
                            statsData[normalizedName].maxScore = actualScore;
                        }
                    }
                });
            }
        }
        
        const players = data.trim().split('\n').map(line => {
            const parts = line.split(':');
            if (parts.length < 11) return null;

            const name = parts[0].trim();
            const history = parts.slice(1, 11).map(v => parseInt(v, 10));
            const graphData = [0, ...history]; 
            
            const currentRate = history[9];
            
            return { name, graphData, currentRate };
        }).filter(p => p !== null);

        players.sort((a, b) => b.currentRate - a.currentRate);

        tableBody.innerHTML = '';
        
        players.forEach((player, index) => {
            const row = document.createElement('tr');
            
            row.innerHTML = `
                <td>${index + 1}</td>
                <td><span class="player-name" onclick="toggleGraph(${index})">${player.name}</span></td>
                <td>${player.currentRate}</td>
            `;
            tableBody.appendChild(row);

            const normalizedPlayerName = normalizeName(player.name);
            const pStats = statsData[normalizedPlayerName];
            
            let statsHtml = '';
            
            if (pStats && pStats.total > 0) {
                player.stats = {
                    total: pStats.total,
                    avgRank: (pStats[1]*1 + pStats[2]*2 + pStats[3]*3 + pStats[4]*4) / pStats.total,
                    maxScore: pStats.maxScore
                };

                const r1 = ((pStats[1] / player.stats.total) * 100).toFixed(1);
                const r2 = ((pStats[2] / player.stats.total) * 100).toFixed(1);
                const r3 = ((pStats[3] / player.stats.total) * 100).toFixed(1);
                const r4 = ((pStats[4] / player.stats.total) * 100).toFixed(1);

                statsHtml = `
                    <div class="stats-container">
                        <h3>対局数: ${player.stats.total}回</h3>
                        <div class="stats-grid">
                            <div class="stat-item avg">平均順位: ${player.stats.avgRank.toFixed(2)}位</div>
                            <div class="stat-item">1位: ${r1}%</div>
                            <div class="stat-item">2位: ${r2}%</div>
                            <div class="stat-item">3位: ${r3}%</div>
                            <div class="stat-item">4位: ${r4}%</div>
                        </div>
                    </div>
                `;
            } else {
                player.stats = null;
                statsHtml = `
                    <div class="stats-container">
                        <h3>対局数: 0回</h3>
                        <div class="stats-grid">
                            <div class="stat-item avg">平均順位: - 位</div>
                            <div class="stat-item">1位: - %</div>
                            <div class="stat-item">2位: - %</div>
                            <div class="stat-item">3位: - %</div>
                            <div class="stat-item">4位: - %</div>
                        </div>
                    </div>
                `;
            }

            const graphRow = document.createElement('tr');
            graphRow.className = 'graph-row';
            graphRow.innerHTML = `
                <td colspan="3" style="padding:0; border:none;">
                    <div id="container-${index}" class="graph-container">
                        <div class="details-flex">
                            ${statsHtml}
                            <div class="graph-container-inner">
                                <canvas id="chart-${index}"></canvas>
                            </div>
                        </div>
                    </div>
                </td>
            `;
            tableBody.appendChild(graphRow);

            initChart(`chart-${index}`, player.graphData, months);
        });

        // ----------------------------------------------------
        // ▼ ランキングデータの生成 ▼
        // ----------------------------------------------------
        const validPlayers = players.filter(p => p.stats !== null);

        // 1. 平均順位ランキング（5局以上のみ対象、昇順）
        const avgSorted = validPlayers
            .filter(p => p.stats.total >= 5)
            .sort((a, b) => a.stats.avgRank - b.stats.avgRank)
            .slice(0, 5);
            
        document.getElementById("rank-avg").innerHTML = avgSorted.map((p, i) => 
            `<li><span><span class="rank-badge">${i+1}</span> ${p.name}</span> <span class="ranking-value">${p.stats.avgRank.toFixed(2)}位<span class="ranking-sub">(${p.stats.total}局)</span></span></li>`
        ).join('');

        // 2. 対局数ランキング
        const totalSorted = [...validPlayers].sort((a, b) => b.stats.total - a.stats.total).slice(0, 5);
        document.getElementById("rank-total").innerHTML = totalSorted.map((p, i) => 
            `<li><span><span class="rank-badge">${i+1}</span> ${p.name}</span> <span class="ranking-value">${p.stats.total}局</span></li>`
        ).join('');

        // 3. 最高得点ランキング
        const scoreSorted = [...validPlayers].sort((a, b) => b.stats.maxScore - a.stats.maxScore).slice(0, 5);
        document.getElementById("rank-score").innerHTML = scoreSorted.map((p, i) => 
            `<li><span><span class="rank-badge">${i+1}</span> ${p.name}</span> <span class="ranking-value">${p.stats.maxScore.toLocaleString()}点</span></li>`
        ).join('');

    } catch (error) {
        tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center;">エラー: ${error.message}</td></tr>`;
    }
}

function initChart(canvasId, data, labels) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'レート推移',
                data: data,
                borderColor: '#3498db',
                backgroundColor: 'rgba(52, 152, 219, 0.1)',
                borderWidth: 3,
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { 
                    min: -520,
                    max: 400
                }
            }
        }
    });
}

function toggleGraph(index) {
    const container = document.getElementById(`container-${index}`);
    container.classList.toggle('open');
}
</script>

</body>
</html>
